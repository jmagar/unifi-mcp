repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: Type check with ty
        language: system
        entry: uv run ty check unifi_mcp
        pass_filenames: false

      - id: docker-security
        name: Check Docker security
        language: script
        entry: bash scripts/check-docker-security.sh
        pass_filenames: false
        always_run: false
        files: ^Dockerfile

      - id: no-baked-env
        name: Check no baked-in env secrets
        language: script
        entry: bash scripts/check-no-baked-env.sh
        pass_filenames: false
        always_run: true

      - id: ensure-ignore-files
        name: Ensure .gitignore patterns present
        language: script
        entry: bash scripts/ensure-ignore-files.sh --check
        pass_filenames: false
        always_run: true

      - id: block-env-commits
        name: Block .env file commits (allow only .env.example)
        entry: bash bin/block-env-commits.sh
        language: system
        pass_filenames: false
        files: '\.env'
        exclude: '\.env\.example$'
